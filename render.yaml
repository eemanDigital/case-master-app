# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: backend
    env: node
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Optional: Use Browserless API for cloud CAC scraping
      # Get free API key at https://browserless.io
      - key: BROWSERLESS_API_KEY
        sync: false
